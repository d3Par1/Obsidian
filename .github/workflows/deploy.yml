name: Deploy Notes to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Clone Quartz (v5 branch)
        run: git clone --branch v5 --depth 1 https://github.com/jackyzha0/quartz.git /tmp/quartz

      - name: Install Quartz dependencies
        working-directory: /tmp/quartz
        run: npm ci

      - name: Copy vault notes into Quartz content
        run: |
          mkdir -p /tmp/quartz/content
          rsync -a --include="*/" --include="*.md" \
            --exclude=".obsidian/" \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude=".quartz/" \
            --prune-empty-dirs \
            ./ /tmp/quartz/content/

      - name: Apply vault config, lockfile, and custom theme
        run: |
          cp .quartz/quartz.config.yaml /tmp/quartz/quartz.config.yaml
          cp .quartz/quartz.lock.json /tmp/quartz/quartz.lock.json
          cp .quartz/custom.scss /tmp/quartz/quartz/styles/custom.scss

      - name: Encrypt notes with site password
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          if [ -z "$SITE_PASSWORD" ]; then
            echo "::error::SITE_PASSWORD secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          python3 <<'PYEOF'
          import os, re
          password = os.environ['SITE_PASSWORD']
          pw_yaml = '"' + password.replace('\\', '\\\\').replace('"', '\\"') + '"'
          inject_line = f'password: {pw_yaml}\n'

          fm_re = re.compile(r'^---\n(.*?\n)---\n', re.DOTALL)
          pw_re = re.compile(r'^password:.*\n', re.MULTILINE)

          count = 0
          for root, _, files in os.walk('/tmp/quartz/content'):
              for name in files:
                  if not name.endswith('.md'):
                      continue
                  path = os.path.join(root, name)
                  with open(path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  m = fm_re.match(content)
                  if m:
                      fm_body = pw_re.sub('', m.group(1))
                      new_fm = '---\n' + inject_line + fm_body + '---\n'
                      content = new_fm + content[m.end():]
                  else:
                      content = '---\n' + inject_line + '---\n\n' + content
                  with open(path, 'w', encoding='utf-8') as f:
                      f.write(content)
                  count += 1
          print(f'Encrypted {count} notes')
          PYEOF

      - name: Install Quartz community plugins
        working-directory: /tmp/quartz
        run: npx quartz plugin install

      - name: Build Quartz
        working-directory: /tmp/quartz
        run: npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
